<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon from public/icon.svg -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO (fallback — react-helmet-async overrides per page) -->
    <title>TweetBotAI — Automate Your X Account with AI</title>
    <meta name="description" content="Create AI-powered bots that post to your real X account automatically. Powered by Google Gemini. AES-256 encrypted. Set up in 2 minutes." />
    <meta name="keywords"    content="twitter automation, X automation, AI tweet bot, auto post twitter, Google Gemini twitter, twitter bot, tweet scheduler, AI content automation" />
    <meta name="author"      content="Kaushalendra Singh" />
    <meta name="creator"     content="Kaushalendra Singh" />
    <meta name="robots"      content="index, follow" />
    <link rel="author"       href="https://kaushalendra-portfolio.vercel.app/" />
    <link rel="canonical"    href="https://tweetbotai.vercel.app" />

    <!-- Open Graph — uses logo.png as share card -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://tweetbotai.vercel.app" />
    <meta property="og:title"        content="TweetBotAI — Automate Your X Account with AI" />
    <meta property="og:description"  content="Create AI-powered bots that post to your real X account automatically. Powered by Google Gemini. AES-256 encrypted. Set up in 2 minutes." />
    <meta property="og:image"        content="https://tweetbotai.vercel.app/logo.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="TweetBotAI - AI-powered X automation platform" />
    <meta property="og:site_name"    content="TweetBotAI" />
    <meta property="og:locale"       content="en_US" />

    <!-- Twitter / X Card — uses logo.png as share card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@tweetbotai" />
    <meta name="twitter:creator"     content="@tweetbotai" />
    <meta name="twitter:title"       content="TweetBotAI — Automate Your X Account with AI" />
    <meta name="twitter:description" content="Create AI-powered bots that post to your real X account automatically. Powered by Google Gemini. AES-256 encrypted. Set up in 2 minutes." />
    <meta name="twitter:image"       content="https://tweetbotai.vercel.app/logo.png" />
    <meta name="twitter:image:alt"   content="TweetBotAI - AI-powered X automation platform" />

    <!-- Theme color -->
    <meta name="theme-color" content="#1d9bf0" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
